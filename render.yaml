services:
  - type: web
    name: smarthire
    env: java
    rootDir: backend
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/smarthire-backend-1.0.0.jar
    plan: free
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: EMAIL_ENABLED
        value: "false"
