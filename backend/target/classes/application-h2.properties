spring.application.name=smarthire

# ─── H2 Database for Development ─────────────────────────────────
spring.datasource.url=jdbc:h2:mem:smarthire;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ─── Server ─────────────────────────────────────────────────
server.port=8080

# ─── JWT ────────────────────────────────────────────────────
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration.ms=86400000

# ─── Email (disabled for development) ──────────────────────────
smarthire.email.enabled=false

# ─── CORS ───────────────────────────────────────────────────
smarthire.cors.allowed-origins=http://localhost:5500,http://127.0.0.1:5500

# ─── Pagination defaults ────────────────────────────────────
smarthire.page.default-size=10
