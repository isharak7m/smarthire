spring.application.name=smarthire

# ─── Database ───────────────────────────────────────────────
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:smarthire;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASS:}
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:empty-schema.sql
spring.sql.init.data-locations=classpath:data-h2.sql

# ─── Server ─────────────────────────────────────────────────
server.port=${PORT:8081}

# ─── JWT ────────────────────────────────────────────────────
# Generate your own: openssl rand -hex 64
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration.ms=86400000

# ─── Email (override in prod via env vars) ──────────────────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USER:your-email@gmail.com}
spring.mail.password=${MAIL_PASS:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
smarthire.email.enabled=${EMAIL_ENABLED:false}
smarthire.email.from=${MAIL_USER:noreply@smarthire.io}

# ─── CORS ───────────────────────────────────────────────────
smarthire.cors.allowed-origins=${FRONTEND_URL:http://localhost:5500,http://127.0.0.1:5500,http://localhost:5501,http://127.0.0.1:5501,http://localhost:3000,http://127.0.0.1:3000,http://localhost:4173,http://127.0.0.1:4173}

# ─── Pagination defaults ────────────────────────────────────
smarthire.page.default-size=10
