services:
  - type: web
    name: smarthire-backend
    env: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/smarthire-backend-1.0.0.jar
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: EMAIL_ENABLED
        value: "false"
